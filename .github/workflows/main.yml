name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Get Public IP
        run: |
          $ip = (Invoke-WebRequest -Uri "https://api.ipify.org").Content
          echo "PUBLIC_IP=$ip" >> $env:GITHUB_ENV
          Write-Host "Public IP: $ip"

      - name: Setup AnyDesk
        run: |
          # Download AnyDesk
          Invoke-WebRequest -Uri "https://download.anydesk.com/AnyDesk.exe" -OutFile "AnyDesk.exe"

          # Install AnyDesk silently to enable service-based unattended access
          Start-Process -FilePath ".\AnyDesk.exe" -ArgumentList "--install C:\AnyDesk --start-with-win --silent" -Wait

          # Wait for installation to complete and service to start
          Start-Sleep -Seconds 5

          # Set Unattended Access Password
          # Note: We use a fixed password here for simplicity, or you can use a secret.
          echo "AnyDesk123!" | C:\AnyDesk\AnyDesk.exe --set-password

          # Retrieve AnyDesk ID
          $anydeskId = C:\AnyDesk\AnyDesk.exe --get-id
          $anydeskId = $anydeskId.Trim()

          Write-Host "======================"
          Write-Host "ANYDESK ACCESS DETAILS"
          Write-Host "AnyDesk ID: $anydeskId"
          Write-Host "Password: AnyDesk123!"
          Write-Host "======================"

      - name: Keep Alive
        run: |
          while ($true) {
            Write-Host "[$(Get-Date)] AnyDesk Active - Session Running..."
            Start-Sleep -Seconds 300
          }

