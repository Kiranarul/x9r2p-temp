name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Get Public IP
        run: |
          $ip = (Invoke-WebRequest -Uri "https://api.ipify.org").Content
          echo "PUBLIC_IP=$ip" >> $env:GITHUB_ENV
          Write-Host "Public IP: $ip"

      - name: Enable RDP properly
        run: |

          # Enable RDP

          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force

          # Enable firewall rule properly

          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          # Ensure service is running

          Set-Service -Name TermService -StartupType Automatic
          Start-Service -Name TermService

          # Wait a bit to ensure RDP is ready

          Start-Sleep -Seconds 10

      - name: Create RDP User
        run: |
          $password = ([guid]::NewGuid().ToString("N").Substring(0, 12)) + "A1!x"
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force

          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"

          echo "RDP_PASSWORD=$password" >> $env:GITHUB_ENV

      - name: Show Credentials
        run: |
          Write-Host "======================"
          Write-Host "RDP ACCESS DETAILS"
          Write-Host "IP: $env:PUBLIC_IP"
          Write-Host "Username: RDP"
          Write-Host "Password: $env:RDP_PASSWORD"
          Write-Host "======================"

      - name: Test RDP locally
        run: |
          $result = Test-NetConnection -ComputerName localhost -Port 3389
          Write-Host "RDP Local Test: $($result.TcpTestSucceeded)"

      - name: Start ngrok TCP Tunnel (FIXED PATH)
        run: |
          Invoke-WebRequest https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip -OutFile ngrok.zip

          Expand-Archive ngrok.zip -DestinationPath ngrok -Force

          cd ngrok

          .\ngrok.exe config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

          Start-Process .\ngrok.exe -ArgumentList "tcp 3389"

          # Wait until tunnel is ready

          $resp = $null
          for ($i=0; $i -lt 10; $i++) {
            try {
              $resp = Invoke-RestMethod http://127.0.0.1:4040/api/tunnels
              if ($resp.tunnels.Length -gt 0) { break }
            } catch {}
            Start-Sleep -Seconds 2
          }

          $url = ($resp.tunnels | Where-Object { $_.proto -eq "tcp" }).public_url

          Write-Host "======================"
          Write-Host "REAL NGROK ADDRESS:"
          Write-Host $url
          Write-Host "======================"

      - name: Keep Alive
        run: |
          while ($true) {
            Write-Host "[$(Get-Date)] RDP Active - IP: $env:PUBLIC_IP"
            Start-Sleep -Seconds 300
          }

