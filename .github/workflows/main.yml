name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Get Public IP
        run: |
          $ip = (Invoke-WebRequest -Uri "https://api.ipify.org").Content
          echo "PUBLIC_IP=$ip" >> $env:GITHUB_ENV
          Write-Host "Public IP: $ip"

      - name: Enable RDP
        run: |
          # Enable RDP connections
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          
          # Disable Network Level Authentication (NLA) - CRITICAL for tunnels
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          
          # Allow RDP through firewall
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # Ensure RDP service is running
          Set-Service -Name TermService -StartupType Automatic
          Restart-Service -Name TermService -Force

      - name: Create RDP User
        run: |
          $password = ConvertTo-SecureString "AnyDesk123!" -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $password -AccountNeverExpires -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Administrators" -Member "RDP" -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP" -ErrorAction SilentlyContinue

      - name: Setup Bore Tunnel
        run: |
          Write-Host "Verifying RDP is listening locally..."
          $rdpTest = Test-NetConnection -ComputerName localhost -Port 3389
          if ($rdpTest.TcpTestSucceeded) {
             Write-Host "RDP is listening on 3389. Good."
          } else {
             Write-Host "RDP is NOT listening! Trying to force start service again..."
             Start-Service -Name TermService -ErrorAction SilentlyContinue
          }

          Write-Host "Downloading Bore..."
          Invoke-WebRequest -Uri "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-pc-windows-msvc.zip" -OutFile "bore.zip"
          Expand-Archive "bore.zip" -DestinationPath . -Force
          
          Write-Host "Starting Bore Tunnel..."
          Start-Process -FilePath ".\bore.exe" -ArgumentList "local 3389 --to bore.pub" -NoNewWindow -RedirectStandardOutput "bore.log" -RedirectStandardError "bore_err.log"
          
          # Wait for the tunnel to establish and logs to populate
          Start-Sleep -Seconds 10
          
          $log = Get-Content "bore.log"
          
          # Extract the remote address (e.g. bore.pub:12345)
          $match = $log | Select-String -Pattern "bore.pub:\d+"
          if ($match) {
             $address = $match.Matches[0].Value
             Write-Host "======================"
             Write-Host "SUCCESS! CONNECT NOW"
             Write-Host "BORE RDP ADDRESS: $address"
             Write-Host "Username: RDP"
             Write-Host "Password: AnyDesk123!"
             Write-Host "======================"
          } else {
             Write-Error "Could not find bore address in logs. Printing logs for debug:"
             $log | Out-String | Write-Host
             Get-Content "bore_err.log" | Out-String | Write-Host
             exit 1
          }

      - name: Keep Alive
        run: |
          while ($true) {
            Write-Host "[$(Get-Date)] RDP Session Active..."
            Start-Sleep -Seconds 300
          }

