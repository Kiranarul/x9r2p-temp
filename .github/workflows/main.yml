name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Get Public IP
        run: |
          $ip = (Invoke-WebRequest -Uri "https://api.ipify.org").Content
          echo "PUBLIC_IP=$ip" >> $env:GITHUB_ENV
          Write-Host "Public IP: $ip"

      - name: Setup AnyDesk
        run: |
          # Download AnyDesk
          Invoke-WebRequest -Uri "https://download.anydesk.com/AnyDesk.exe" -OutFile "AnyDesk.exe"

          # Install AnyDesk silently to enable service-based unattended access
          Write-Host "Installing AnyDesk..."
          Start-Process -FilePath ".\AnyDesk.exe" -ArgumentList "--install C:\AnyDesk --start-with-win --silent" -Wait

          # Wait for installation block and service to start
          $anydeskPath = "C:\AnyDesk\AnyDesk.exe"
          $maxRetries = 20
          $retryCount = 0

          while (-not (Test-Path $anydeskPath) -and $retryCount -lt $maxRetries) {
            Write-Host "Waiting for AnyDesk installation... ($retryCount)"
            Start-Sleep -Seconds 3
            $retryCount++
          }

          if (-not (Test-Path $anydeskPath)) {
            Write-Error "AnyDesk installation failed or took too long."
            exit 1
          }

          # Set Unattended Access Password
          Write-Host "Setting password..."
          echo "AnyDesk123!" | & $anydeskPath --set-password

          # Retrieve AnyDesk ID with retries
          Write-Host "Retrieving AnyDesk ID..."
          $anydeskId = $null
          $retryCount = 0
          while ($null -eq $anydeskId -and $retryCount -lt $maxRetries) {
            $anydeskId = & $anydeskPath --get-id
            if ($anydeskId) {
              $anydeskId = $anydeskId.Trim()
              if ($anydeskId -match '^\d+$' -or $anydeskId -match '^[\d\s]+$') { break }
            }
            $anydeskId = $null
            Write-Host "Waiting for AnyDesk ID registration... ($retryCount)"
            Start-Sleep -Seconds 5
            $retryCount++
          }

          if ($null -eq $anydeskId) {
            Write-Error "Failed to retrieve a valid AnyDesk ID."
            exit 1
          }

          Write-Host "======================"
          Write-Host "ANYDESK ACCESS DETAILS"
          Write-Host "AnyDesk ID: $anydeskId"
          Write-Host "Password: AnyDesk123!"
          Write-Host "======================"

      - name: Keep Alive
        run: |
          while ($true) {
            Write-Host "[$(Get-Date)] AnyDesk Active - Session Running..."
            Start-Sleep -Seconds 300
          }

