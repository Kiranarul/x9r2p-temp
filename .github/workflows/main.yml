name: RDP

on:
workflow_dispatch:

jobs:
secure-rdp:
runs-on: windows-latest
timeout-minutes: 3600

permissions:
  contents: write
  actions: read

steps:
  - name: Checkout
    uses: actions/checkout@v4
    with:
      token: ${{ secrets.GITHUB_TOKEN }}
      fetch-depth: 0

  - name: Get Public IP
    run: |
      $ip = (Invoke-WebRequest -Uri "https://api.ipify.org").Content
      echo "PUBLIC_IP=$ip" >> $env:GITHUB_ENV
      Write-Host "Public IP: $ip"

  - name: Enable RDP + Open Port
    run: |
      Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
        -Name "fDenyTSConnections" -Value 0 -Force

      netsh advfirewall firewall add rule name="RDP-Open" `
        dir=in action=allow protocol=TCP localport=3389

      Restart-Service -Name TermService -Force

  - name: Create RDP User
    run: |
      $password = [System.Web.Security.Membership]::GeneratePassword(16,3)
      $securePass = ConvertTo-SecureString $password -AsPlainText -Force

      New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
      Add-LocalGroupMember -Group "Administrators" -Member "RDP"
      Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"

      echo "RDP_PASSWORD=$password" >> $env:GITHUB_ENV

  - name: Show Credentials
    run: |
      Write-Host "=== RDP ACCESS ==="
      Write-Host "IP: $env:PUBLIC_IP"
      Write-Host "Username: RDP"
      Write-Host "Password: $env:RDP_PASSWORD"

  - name: Keep Alive
    run: |
      while ($true) {
        Write-Host "[$(Get-Date)] RDP Active - IP: $env:PUBLIC_IP"
        Start-Sleep -Seconds 300
      }

