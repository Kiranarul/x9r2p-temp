name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Get Public IP
        run: |
          $ip = (Invoke-WebRequest -Uri "https://api.ipify.org").Content
          echo "PUBLIC_IP=$ip" >> $env:GITHUB_ENV
          Write-Host "Public IP: $ip"

      - name: Enable RDP (Nuclear Fix)
        run: |
          # 1. Disable Firewall Entirely
          netsh advfirewall set allprofiles state off
          
          # 2. Enable RDP & Disable NLA
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fAllowToGetHelp" -Value 1 -Force
          
          # 3. Force RDP to use TCP only (No UDP)
          New-Item -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Force | Out-Null
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "SelectTransport" -Value 1 -Force
          
          # 4. Set RDP Security Layer to RDP (To avoid handshake issues)
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 1 -Force
          
          # 5. Force Restart RDP Service
          Restart-Service -Name TermService -Force

      - name: Create RDP User
        run: |
          $password = ConvertTo-SecureString "AnyDesk123!" -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $password -AccountNeverExpires -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Administrators" -Member "RDP" -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP" -ErrorAction SilentlyContinue

      - name: Setup Cloudflare Tunnel
        run: |
          Write-Host "Downloading Cloudflared..."
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile "cloudflared.exe"
          
          Write-Host "Starting Cloudflare Quick Tunnel (RDP Mode)..."
          # Using rdp:// instead of tcp:// for better WebSocket handling
          Start-Process -FilePath ".\cloudflared.exe" -ArgumentList "tunnel --url rdp://localhost:3389" -NoNewWindow -RedirectStandardError "cloudflare.log"
          
          # Wait for tunnel registration
          Start-Sleep -Seconds 15
          
          $log = Get-Content "cloudflare.log"
          
          # Search for the trycloudflare URL
          $match = $log | Select-String -Pattern "https://[a-z0-9-]+\.trycloudflare\.com"
          if ($match) {
             $url = $match.Matches[0].Value
             $hostname = $url.Replace("https://", "")
             Write-Host "======================"
             Write-Host "CLOUDFLARE TUNNEL READY!"
             Write-Host "HOSTNAME: $hostname"
             Write-Host "Username: RDP"
             Write-Host "Password: AnyDesk123!"
             Write-Host "======================"
          } else {
             Write-Error "Could not find Cloudflare URL in logs. Printing logs for debug:"
             $log | Out-String | Write-Host
             exit 1
          }

      - name: Keep Alive
        run: |
          while ($true) {
            Write-Host "[$(Get-Date)] Cloudflare Tunnel Active..."
            Start-Sleep -Seconds 300
          }

