name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Chrome Remote Desktop
        run: |
          Write-Host "Downloading Chrome Remote Desktop Host..."
          $installer = "$env:TEMP\chromeremotedesktophost.msi"
          $uri = 'https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi'
          (New-Object Net.WebClient).DownloadFile($uri, $installer)
          
          Write-Host "Installing Chrome Remote Desktop Host (Silent)..."
          Start-Process -FilePath msiexec.exe -ArgumentList "/i $installer /qn" -Wait
          
          Write-Host "Registering Chrome Remote Desktop Host..."
          # The one-time code you provided
          $authCode = "4/0Aci98E_OBDyTWiyvTS9ysSpvFYa_VG6LChXTeloeaJfG5q6hzRtzT04csUkttFYuGqJpSA"
          $pin = "123456"
          
          # Command to start and register the host headlessly
          & "${Env:PROGRAMFILES(X86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe" `
            --code="$authCode" `
            --redirect-url="https://remotedesktop.google.com/_/oauthredirect" `
            --name="GitHub-Runner" `
            --pin="$pin"
          
          Write-Host "============================"
          Write-Host "CRD SETUP COMPLETE!"
          Write-Host "Connect at: https://remotedesktop.google.com/access"
          Write-Host "Look for device: 'GitHub-Runner'"
          Write-Host "Your PIN is: $pin"
          Write-Host "============================"

      - name: Keep Alive
        run: |
          while ($true) {
            Write-Host "[$(Get-Date)] Chrome Remote Desktop Active..."
            Start-Sleep -Seconds 300
          }

