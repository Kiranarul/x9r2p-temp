name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: RDP Nuclear Fixes
        run: |
          # 1. Disable IPv6
          Write-Host "Disabling IPv6..."
          Disable-NetAdapterBinding -Name "*" -ComponentID ms_tcpip6 -ErrorAction SilentlyContinue
          
          # 2. Disable Firewall
          Write-Host "Disabling Windows Firewall..."
          netsh advfirewall set allprofiles state off
          
          # 3. Wake up Display and Disable NLA
          Write-Host "Waking up Graphical Session & Disabling NLA..."
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fAllowToGetHelp" -Value 1 -Force
          
          # 4. Create Local User
          $password = ConvertTo-SecureString "AnyDesk123!" -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $password -AccountNeverExpires -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Administrators" -Member "RDP" -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP" -ErrorAction SilentlyContinue
          Start-Service TermService -ErrorAction SilentlyContinue

      - name: Setup Pinggy Tunnel
        run: |
          Write-Host "Generating SSH Key for Pinggy..."
          ssh-keygen -t rsa -b 4096 -f "$env:USERPROFILE\.ssh\id_rsa" -N '""' -q
          
          Write-Host "Creating SSH Tunnel via Pinggy..."
          # Start SSH tunnel targeting port 443 with strict host checking disabled
          Start-Process -FilePath "ssh" -ArgumentList "-p 443 -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -R0:127.0.0.1:3389 tcp@a.pinggy.io" -NoNewWindow -RedirectStandardError "pinggy_err.log" -RedirectStandardOutput "pinggy.log"
          
          Write-Host "Waiting for tunnel initialization..."
          Start-Sleep -Seconds 15
          
          $log = Get-Content "pinggy.log"
          
          # Match either the full URL or "Allocated port 12345"
          $urlMatch = $log | Select-String -Pattern "tcp://[a-zA-Z0-9.-]+:[0-9]+"
          $portMatch = $log | Select-String -Pattern "Allocated port ([0-9]+)"
          
          $address = ""
          if ($urlMatch) {
             $address = $urlMatch.Matches[0].Value.Replace("tcp://", "")
          } elseif ($portMatch) {
             $port = $portMatch.Matches[0].Groups[1].Value
             $address = "tcp.a.pinggy.io:$port"
          }
          
          if ($address) {
             Write-Host "===================================="
             Write-Host "RDP TUNNEL READY - ZERO INSTALL!"
             Write-Host "1. Open Windows Remote Desktop Connection"
             Write-Host "2. Paste this exact address:"
             Write-Host "   ADDRESS:  $address"
             Write-Host "3. Username: RDP"
             Write-Host "4. Password: AnyDesk123!"
             Write-Host "===================================="
          } else {
             Write-Error "Could not find Pinggy URL/Port in logs. Printing logs for debug:"
             $log | Out-String | Write-Host
             exit 1
          }

      - name: Keep Alive
        run: |
          while ($true) {
            Write-Host "[$(Get-Date)] Chrome Remote Desktop Active..."
            Start-Sleep -Seconds 300
          }

